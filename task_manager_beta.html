<html>

<head>
    <title>Task Manager(Beta)</title>

    <!-- timeline.js -->
    <script src="./vis-timeline/standalone/umd/vis-timeline-graph2d.min.js" type="text/javascript" ></script>
    <link href="./vis-timeline/styles/vis-timeline-graph2d.min.css" rel="stylesheet" type="text/css" />

    <!-- task_manager.js -->
    <script src="task_manager_env.js" type="text/javascript" defer></script>
    <script src="crypt.js" type="text/javascript" defer></script>
    <script src="task_manager.js" type="text/javascript" defer></script>

    <style type="text/css">
        body { font-size: 70%; }
        body.no_scroll { overflow: hidden; }

        /* 子要素を横方向へ配置 */
        .flex-box {display: flex; }
        .flex-box-h-even {display: flex; justify-content: space-between; }
        .flex-box-vCenter {display: flex; align-items: center;}

        /* 文字小さめ */
        .font_small { font-size: 70%; }
        
        /* --------- Task List --------*/
        select.task_list {
          width: 37vw;
          height: 550px;
        }
        select.h-half-w {
          width: 37vw;
          height: 300px;
        }
        select.h-half-w2 {
          width: 37vw;
          height: 150px;
        }
        select.h-half-w3 {
          width: 37vw;
          height: 100px;
        }
        select.h-half {
          width: 20vw;
          height: 300px;
        }
        .list-title { font-size: 140%; font-weight: bold; }

        .stock_list { background-color: white; }
        .todays_must_list { background-color: rgb(248, 251, 209); }
        .todays_list { background-color: rgb(251, 225, 229); }
        .done_list { background-color: rgb(214, 230, 235); }

        .done { color: rgb(209, 209, 209); font-size: 100%; }
        .today { color: mediumblue; }
        /* .first { color: red; font-weight: bold; } */
        .first { background-color: #FFFF55; font-weight: bold; }
        .later { color: green; }
        .now { background-color: #2fff28; font-weight: bold; }
        .non_task { color: #555555; }
        /* .wait::after { content: ' \01f4a4'; } */
        /* .has_url::before { content: ' \01f30f'; } */
        /* .period_today::before { content: ' \026a0'; } */

        .group_top { text-indent: 0px; font-size: 120%; font-weight: bold; text-decoration: underline; }
        /* .group_level1 { text-indent: 1rem; } */

        .group_expire_soon { color: red; }

        /* Button */
        button.button-large { width: 120; height: 50; font-size: 150%; }
        button.button-mid { width: 100; height: 50; font-size: 150%; }
        button.button-small { width: 100; height: 30; font-size: 150%; }
        button.set_filter_condition { height: 40; }
        button.set_filter_condition_on { background-color: #FFCCFF; }
        button:hover { background-color: rgb(168, 168, 168); }

        /* Custom Checkbox */
        .checkbox_ex {
          font-family: system-ui, sans-serif;
        }
        /* チェックボックス本体は非表示 */
        input.checkbox_ex[type="checkbox"] {
          display: none;
        }
        /* ボタン風ラベル */
        label.checkbox_ex {
          display: inline-block;
          padding: 5px 12px;
          margin: 4px;
          border: 1px solid #ccc;
          border-radius: 8px;
          background: #f9f9f9;
          cursor: pointer;
          user-select: none;
          transition: all 0.2s ease;
        }
        /* hover */
        label.checkbox_ex:hover {
          background: #f0f0f0;
        }
        /* チェック状態の共通スタイル */
        input.checkbox_ex[type="checkbox"]:checked + label.checkbox_ex {
          background: blue;
          color: white;
          border-color: blue;
          font-weight: 600;
        }

        /* Edit */
        input.short-width { width: 50; }

        /* ----------- pupup ---------- */
        .popup_edit { 
          /* display: none; */
          visibility:hidden;
          opacity: 0;
          background-color: aquamarine;
          width: 340px;
          height: 310px;
          border-radius: 10px;
          position: absolute;
          top:100px;
          left: 40px;
          z-index: 2000;
          transition-duration: 200ms;
          transition-property: opacity;
        }
        .popup_size_fit { width: 220px; }
        .button-small { width: 80; height: 30; font-size: 130%; }
        .popup_edit_note_button {height: 50px;}

        /* 暗幕 */
        .popup_bg_cover{
          display: none;
          position: fixed;
          background: rgba(0, 0, 0, .3); /* 半透明の黒色 */
          width: 100%;
          height: 100%;
          top: 0;
          left: 0;
          z-index: 1000; /* 要素をコンテンツより前面に（要調整） */
        }

        /* ----------- pupup note/mail preview (mousehover) ---------- */
        .popup_note_mail_preview { 
          display: none;
          font-weight: bold;
          background-color: rgb(235, 235, 235); 
          padding: 5px; 
          border-style: solid; 
          border-color: #000000; 
          border-radius: 10px; 
          border-width: 1px;
          position: absolute;
          overflow-y: scroll;
          z-index: 3000;
        }

        /* ----------- Copy pupup ---------- */
        .popup_copy { display: none; position: absolute; }
        .popup_copy_text { color: green; font-size: 150%; font-weight: bold; text-shadow: 2px 2px 0px #FFFFFF; }
        
        /* ---------- timeline --------- */
        .timeline_area{ font-size: 70%; }

        /* timeline軸（見出し行）のテキストの色 */
        .vis-time-axis .vis-text.vis-minor {color: #000000;}
        /* timeline軸（見出し行）の背景色 */
        .vis-time-axis.vis-foreground {background: #d1adfd;}
        /* timeline軸（見出し行）の週末の文字色*/
        .vis-text.vis-minor.vis-saturday, .vis-text.vis-minor.vis-sunday {color:red;}

        /* weekend */
        .vis-grid.vis-saturday, .vis-grid.vis-sunday {background: pink;}

        /* holiday (8/12 - 8/19) */
        .vis-grid.vis-vertical.vis-minor.vis-day12.vis-august { background: hotpink; }
        .vis-grid.vis-vertical.vis-minor.vis-day13.vis-august { background: hotpink; }
        .vis-grid.vis-vertical.vis-minor.vis-day14.vis-august { background: hotpink; }
        .vis-grid.vis-vertical.vis-minor.vis-day15.vis-august { background: hotpink; }
        .vis-grid.vis-vertical.vis-minor.vis-day16.vis-august { background: hotpink; }
        .vis-grid.vis-vertical.vis-minor.vis-day19.vis-august { background: hotpink; }

        /* today */
        .vis-grid.vis-today {background: rgb(146, 239, 255);}

        /* item(range) */
        .vis-item { background-color: #cbf8cf; border-color: #1e7626; }
        .vis-item.timeline_item_item_done { background-color: rgb(245, 245, 245); border-color: gray }

        /* item style */
        .timeline_item_group { font-size: 110%; font-weight: bold; background-color: rgb(207, 207, 207); border-color: gray}   /* グループ名 */ 
        .timeline_item_item { font-size: 80%; color:blue }              /* アイテム名 */
        .timeline_item_item .vis-item-content > div { color: black; }   /* アイテムの上に表示するグループ名 */
        .timeline_item_item_done { font-size: 60%; color:rgb(182, 182, 182); }
        .timeline_item_item_wait { font-size: 60%; color:cornflowerblue; }
        .timeline_item_item_priority { font-size: 80%; font-weight: bold; color:red }

        /* --------------- Button Area ---------------- */
        .button_area_div {
          visibility: hidden;
          opacity: 0;
          padding: 27px;
          width: 750px;
          height: 200px;
          position: absolute;
          background-color: rgb(248, 255, 223);
          border: 1px solid rgb(147, 147, 147);
          border-radius: 10px;
          transition-duration: 200ms;
          transition-property: opacity;
        }

        /* --------------- Address List ---------------- */
        .iframe_address_list_div {
          /* display: none; */
          visibility: hidden;
          opacity: 0;
          padding: 5px;
          width: 700px;
          height: 400px;
          position: absolute;
          background-color: rgb(236, 236, 236);
          border: 1px solid rgb(147, 147, 147);
          border-radius: 10px;
          transition-duration: 200ms;
          transition-property: opacity;
        }
        .iframe_address_list {
          width: 100%;
          height: 100%;
        }

        /* --------------- URL List ---------------- */
        .popup_url_list_div {
          visibility: hidden;
          opacity: 1;
          padding: 27px;
          width: 750px;
          height: 350px;
          position: absolute;
          background-color: rgb(213, 237, 246);
          border: 1px solid rgb(147, 147, 147);
          border-radius: 10px;
          transition-duration: 200ms;
          transition-property: opacity;
          overflow-y: scroll;
        }

        .popup_url_list_div > button {
          width: 120;
          height: 50;
          font-size: 100%;
          padding: 0px;
          margin: 2px;
        }

        /* --------------- Calender ---------------- */
        .iframe_calender {
          /* display: none; */
          /* position: fixed; */
          /* top : 100px; */
          /* left: 200px; */
          width: 100%;
          height: 400px;
          /* z-index: 510; */
          background-color: #fff;
          overflow: hidden;
        }

        .fukidashi {
          display: none;
        }

        .tips_test:hover + .fukidashi {
          display: block;
        }

        /* Border */
        .border {
          padding: 5px;
          border-style: solid;
          border-color: red;
          border-radius: 10px;
        }
        .border2 {
          padding: 5px;
          border-style: solid;
          border-color: blue;
          border-radius: 10px;
        }

        /* --------------- 出勤ステータス ---------------- */
        /* 共通スタイル：角丸の枠＋余白 */
        .status_box {
          display: inline-block;
          position: relative;
          padding: 6px 12px;
          margin: 4px;
          border-radius: 12px; /* 角を丸く */
          font-weight: bold;
          color: #fff; /* 文字は白 */
        }

        /* 在宅状況ごとの色 */
        .status_office {
          background-color: #e74c3c; /* 赤 */
        }
        .status_remote {
          background-color: #27ae60; /* 緑 */
        }
        .status_dayoff {
          background-color: #7f8c8d; /* グレー */
        }
        .status_out {
          background-color: darkorange; /* 黄色 */
        }
        .status_wework {
          background-color: blue; /* 青 */
        }

        /* AM/PM 休暇バッジ */
        .dayoff_badge {
          position: absolute;
          bottom: -4px;
          right: -4px;
          background: #f1c40f;
          color: #000;
          font-size: 9px;
          font-weight: bold;
          padding: 2px 4px;
          border-radius: 6px;
        }

        /* --------------- コピーアニメーション(浮かせる文字 (湯気風)) ---------------- */
        .copy-steam {
          position: absolute;
          left: 0; top: 0;
          transform: translate(-50%, 0);
          font-family: system-ui, sans-serif;
          font-weight: 700;
          font-size: 14px;
          color: green;
          pointer-events: none;
          white-space: nowrap;
          animation: steamRise 2s ease-out forwards;
          text-shadow: 0 0 4px rgba(0,0,0,0.15);
        }
        @keyframes steamRise {
          0% {
            opacity: 1;
            transform: translate(-50%, 0) scale(1);
            filter: blur(0px);        /* くっきり */
          }
          70% {
            opacity: 0.8;
            transform: translate(-50%, -40px) scale(1.05);
            filter: blur(4px);        /* 少しぼやけ始める */
          }
          100% {
            opacity: 0;
            transform: translate(-50%, -60px) scale(1.1);
            filter: blur(12px);       /* かなりぼやけて消える */
          }
        }

        /* マウスオーバー可能領域 */
        .mouseover_area {
          font-size: 150%;
          text-align: center;
          vertical-align: baseline;
          height: 5vw;
          width: 10vw;
          border: 1px solid #ccc;
          border-radius: 8px;
        }
        .mouseover_area:hover {
          background-color: rgb(205, 205, 205);
        }

        /* table */
        table {
          border-collapse: collapse;
          border: 2px solid rgb(140 140 140);
        }
        th,td {
          border: 1px solid rgb(160 160 160);
          padding: 8px 10px;
        }
    </style>

    <!-- 環境ごとのCSS(上のCSSを上書き) -->
    <link rel="stylesheet" type="text/css" href="task_manager_env.css">

</head>









<body>

  <!-- Timeline -->
  <div id="timeline_area" class="timeline_area">
    <div id="visualization"></div>
  </div>
  <br>


  <!-- List -->
  <div class="flex-box">
    <!-- All List -->
    <div>
      <div class="list-title">全タスク</div>
      <div class="flex-box">
        <button id="copy_stock_list" class="button-small">Talbeコピー</button>
        &nbsp;
        <!-- フィルタボタン表示エリア -->
        <div id="set_filter_condition_div"></div>
      </div>
      <div class="flex-box-vCenter">
        <span>検索</span>
        <input list="stock_list_filter_select_items" id="stock_list_filter_text" tabindex="5" placeholder="タスク検索">
        <datalist id="stock_list_filter_select_items"></datalist>
        <!-- 済みタスク表示・非表示切り替え -->
        <input class="checkbox_ex" id="stock_list_done_hidden" type="checkbox">
        <label class="checkbox_ex" id="stock_list_done_hidden_label" for="stock_list_done_hidden">済み非表示</label>
      </div>
      <select id="stock_list" class="stock_list task_list" tabindex="10" multiple></select>
    </div>
    &nbsp;&nbsp;&nbsp;

    <div>
      <!-- EveryDay List -->
      <div>
        <div id="label_everyday_task" class="list-title">毎日のタスク</div>
        <select id="everyday_task_list" class="everyday_task_list h-half-w3" tabindex="25" multiple></select>
      </div>

      &nbsp;&nbsp;&nbsp;

      <!-- Todays Must List -->
      <div>
        <div id="label_todays_must_task" class="list-title">今日の必須タスク</div>
        <button id="copy_todays_must_list" class="button-small">コピー</button>
        <!-- <input type="checkbox" id="toggle_show_done"> -->
        <!-- <label for="toggle_show_done">済み表示切替</label> -->
        <!-- <input type="checkbox" id="lock_todays_task"> -->
        <!-- <label for="lock_todays_task">🔒ロック</label> -->
        <select id="todays_must_list" class="todays_must_list h-half-w2" tabindex="25" multiple></select>
      </div>

      &nbsp;&nbsp;&nbsp;

      <!-- Todays List -->
      <div>
        <div id="label_todays_task" class="list-title">今日やりたいタスク</div>
        <!-- <button id="copy_todays_list" class="button-mid">コピー</button> -->
        <!-- <button id="todays_expires_to_todays_list" class="button-mid">登録(本日期限)</button> -->
        <button id="release_todays_add_task" class="button-small">追加状態 解除</button>
        <input type="checkbox" id="toggle_show_done">
        <label for="toggle_show_done">済み表示切替</label>
        <input type="checkbox" id="lock_todays_task">
        <label for="lock_todays_task">🔒ロック</label>
        <br>
        <select id="todays_list" class="todays_list h-half-w" tabindex="20" multiple></select>
      </div>
    </div>

    &nbsp;&nbsp;&nbsp;

    <div>
      <!-- Done List -->
      <div>
        <div class="list-title">今日の処理済み</div>
        <div class="flex-box">
          <button id="copy_done_list" class="button-small">コピー</button>
          <button id="copy_updates_list" class="button-small">本日更新コピー</button>
          &nbsp;
          <button id="release_todays_done" class="button-small">今日を解除</button>
        </div>
        <select id="done_list" class="done_list h-half" tabindex="30" multiple></select>
      </div>
      <br>

      <!-- Priority List -->
      <div>
        <div class="list-title">タスク優先順位 (カッコ内は重要度スコア)</div>
        <select id="priority_list" class="h-half" tabindex="40" multiple></select>
      </div>
    </div>
  </div>

  <br>



  <div class="flex-box-h-even">
    <!-- Input -->
    <div class="flex-box">
      <div>
        <div class="list-title">グループ追加</div>
        <textarea id="input_area" cols="30" rows="3" placeholder="[グループ名; 期限]
  [タスク名]
  [タスク名] ... "></textarea>
        <br>
        <button id="btn_input_reflect">リストへ追加</button>
      </div>

      &nbsp;
      <div>
        <div class="list-title">アイテム追加</div>
        <textarea id="add_item_text" cols="30" rows="3" placeholder="タスク名(改行で複数登録)"></textarea>
        <br>
        <button id="add_item">アイテム追加</button>
      </div>

      &nbsp;
      <div>
        <div class="list-title">JSON</div>
        <textarea id="input_json_area" cols="30" rows="3"></textarea>
        <br>
        <button id="btn_input_json">JSONテキストを取込み</button>
        <br>
        <label for="btn_input_json_file">ファイルから読み込み</label>
        <input type="file" id="btn_input_json_file" accept=".json">
      </div>
    </div>

    <div>
      <!-- URL List Area -->
       <div id="url_list_hover_area" class="mouseover_area">URL一覧<br>(ここにマウスカーソルを当てる)</div>
    </div>

    <div>
      <!-- Button Area -->
       <div id="buttons_hover_area" class="mouseover_area">ボタン系<br>(ここにマウスカーソルを当てる)</div>
    </div>

    <div>
      <!-- Address List -->
       <div id="address_list_hover_area" class="mouseover_area">アドレス帳<br>(ここにマウスカーソルを当てる)</div>
    </div>

  </div>

  <br>
  <br>


  <!-- 出社/在宅状況 -->
  <div class="flex-box">
    <button id="read_member_status">Read</button>
    <div id="member_status_area"></div>
  </div>


  <!-- Calender -->
  <iframe id="calender_area" class="iframe_calender" src="./calender.html"></iframe>



  <!-- Popup -->
  <div id="popup_edit_base" class="popup_edit">
    <form id="popup_edit_form" onsubmit="return false;" novalidate >
      <select id="popup_edit_group_list" class="popup_size_fit" size="1" name="groups" ></select>
      <input id="popup_edit_text" class="popup_size_fit" type="text" autocomplete="off" name="name">
      <div class="flex-box">
        <input id="popup_edit_url" type="url" class="popup_size_fit" autocomplete="off" placeholder="URL" >
        <input id="popup_button_copy_url" type="button" value="Copy" >
      </div>
      <div id="popup_edit_url_app_type" class="flex-box">
        <label><input type="radio" name="url_app_type" value="auto">Auto</label>
        <label><input type="radio" name="url_app_type" value="excel">Excel</label>
        <label><input type="radio" name="url_app_type" value="powerpoint" checked>Ppt</label>
        <label><input type="radio" name="url_app_type" value="word">Word</label>
        <label><input type="radio" name="url_app_type" value="web">Web</label>
      </div>

      <input id="popup_edit_mail" type="text" class="popup_size_fit" autocomplete="off" placeholder="メール件名" >

      <div class="flex-box">
        <textarea id="popup_edit_note" class="popup_size_fit" rows="3" autocomplete="off" placeholder="メモ(進捗など)
※Shift + Enterで改行入力"></textarea>
        <input type="button" class="popup_edit_note_button" id="popup_edit_note_add_btn" value="追加">
      </div>

      <div class="flex-box-vCenter">
        <input id="popup_edit_date" type="date" name="period" value="2018-07-22" min="2023-11-01" max="2030-12-31" data-weekday_elem="popup_edit_week_day" >
        <div id="popup_edit_week_day"></div>
        <input id="popup_button_set_today" type="button" value="今日" data-target="popup_edit_date" >
        <input id="popup_button_date_inc" type="button" value="+1d" data-inc_date="1" data-target="popup_edit_date" >
        <input id="popup_button_date_inc1w" type="button" value="+1w" data-inc_date="7" data-target="popup_edit_date" >
        <input id="popup_button_date_inc1m" type="button" value="+1M" data-target="popup_edit_date" >
        &nbsp;&nbsp;
        <input id="popup_button_date_clear" type="button" value=" C " data-target="popup_edit_date" >
      </div>
      <div class="flex-box-vCenter">
        <input id="popup_edit_date_end" type="date" name="period_end" value="2018-07-22" min="2023-11-01" max="2030-12-31" data-weekday_elem="popup_edit_date_end_week_day" >
        <div id="popup_edit_date_end_week_day"></div>
        <input id="popup_button_date_end_set_today" type="button" value="今日" data-target="popup_edit_date_end" >
        <input id="popup_button_date_end_inc" type="button" value="+1d" data-inc_date="1" data-target="popup_edit_date_end" data-from_target="popup_edit_date" >
        <input id="popup_button_date_end_inc1w" type="button" value="+1w" data-inc_date="7" data-target="popup_edit_date_end" data-from_target="popup_edit_date" >
        <input id="popup_button_date_end_inc1m" type="button" value="+1M" data-target="popup_edit_date_end" data-from_target="popup_edit_date" >
        &nbsp;&nbsp;
        <input id="popup_button_date_end_clear" type="button" value=" C " data-target="popup_edit_date_end" >
      </div>

      <div class="flex-box">
        <input class="checkbox_ex" id="popup_edit_done" type="checkbox" >
        <label class="checkbox_ex" id="popup_edit_done_label" for="popup_edit_done">済み</label>
        <input class="checkbox_ex" id="popup_edit_wait" type="checkbox" >
        <label class="checkbox_ex" id="popup_edit_wait_label" for="popup_edit_wait">待ち</label>
        <input class="checkbox_ex" id="popup_edit_everyday" type="checkbox" >
        <label class="checkbox_ex" id="popup_edit_everyday_label" for="popup_edit_everyday">毎日</label>
        <input class="checkbox_ex" id="popup_edit_priority" type="checkbox" >
        <label class="checkbox_ex" id="popup_edit_priority_label" for="popup_edit_priority">重要</label>
        <input class="checkbox_ex" id="popup_edit_ignore_tcopy" type="checkbox" >
        <label class="checkbox_ex" id="popup_edit_ignore_tcopy_label" for="popup_edit_ignore_tcopy">Tコピー除外</label>
        <input class="checkbox_ex" id="popup_edit_favorite" type="checkbox" >
        <label class="checkbox_ex" id="popup_edit_favorite_label" for="popup_edit_favorite">お気に入り</label>
      </div>

      <input id="popup_edit_created" type="text" disabled >
      <input id="popup_edit_id" class="short-width" type="text" name="id">
      <input type="hidden" id="popup_edit_hidden_id" name="id" >
      <input type="hidden" id="popup_edit_hidden_parent_elem_id" name="parent_elem_id" >
      <div>
        <input type="submit" class="button-small" value="OK" >
        <input type="button" id="popup_edit_cancel_btn" class="button-small" value="Cancel">
      </div>
